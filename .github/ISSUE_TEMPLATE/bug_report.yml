name: Bug report
description: Report a reproducible problem in AnyCode
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please remove secrets and personal data from logs and screenshots.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behaviour and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AnyCode version or commit
      placeholder: v0.0.1 or a commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, and relevant provider/model details.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove API keys, tokens, paths, and private content before attaching anything.
